---
- name: generate_iso | Create build directory
  ansible.builtin.file:
    path: "{{ build_dir }}"
    state: directory
    mode: "0755"

- name: generate_iso | Create openshift subdirectory
  ansible.builtin.file:
    path: "{{ build_dir }}/openshift"
    state: directory
    mode: "0755"

- name: generate_iso | Template install-config.yaml
  ansible.builtin.template:
    src: install-config.yaml.j2
    dest: "{{ build_dir }}/install-config.yaml"
    mode: "0600"

- name: generate_iso | Template agent-config.yaml
  ansible.builtin.template:
    src: agent-config.yaml.j2
    dest: "{{ build_dir }}/agent-config.yaml"
    mode: "0644"

- name: generate_iso | Template Butane configs
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ build_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - 90-var-virtstore-partition.bu
    - 91-iommu-pt.bu
    - 92-serial-console.bu
    - 93-sysrq.bu

- name: generate_iso | Compile Butane configs to MachineConfig YAML
  ansible.builtin.command:
    cmd: >-
      {{ butane_binary }} --strict
      {{ build_dir }}/{{ item }}
      -o {{ build_dir }}/openshift/{{ item | regex_replace('\.bu$', '.yaml') }}
  loop:
    - 90-var-virtstore-partition.bu
    - 91-iommu-pt.bu
    - 92-serial-console.bu
    - 93-sysrq.bu
  changed_when: true

- name: generate_iso | Back up install-config.yaml
  ansible.builtin.copy:
    src: "{{ build_dir }}/install-config.yaml"
    dest: "{{ build_dir }}/install-config.yaml.bak"
    mode: "0600"

- name: generate_iso | Back up agent-config.yaml
  ansible.builtin.copy:
    src: "{{ build_dir }}/agent-config.yaml"
    dest: "{{ build_dir }}/agent-config.yaml.bak"
    mode: "0644"

- name: generate_iso | Generate agent ISO
  ansible.builtin.command:
    cmd: "{{ openshift_install_binary }} agent create image --dir {{ build_dir }}"
  changed_when: true

- name: generate_iso | Restore install-config.yaml from backup
  ansible.builtin.copy:
    src: "{{ build_dir }}/install-config.yaml.bak"
    dest: "{{ build_dir }}/install-config.yaml"
    mode: "0600"

- name: generate_iso | Restore agent-config.yaml from backup
  ansible.builtin.copy:
    src: "{{ build_dir }}/agent-config.yaml.bak"
    dest: "{{ build_dir }}/agent-config.yaml"
    mode: "0644"

- name: generate_iso | Print ISO location
  ansible.builtin.debug:
    msg: "ISO generated at: {{ build_dir }}/agent.x86_64.iso"

- name: generate_iso | Print kubeconfig location
  ansible.builtin.debug:
    msg: "Kubeconfig: {{ build_dir }}/auth/kubeconfig"

- name: generate_iso | Print required DNS records
  ansible.builtin.debug:
    msg: |
      Create the following DNS records pointing to {{ rendezvous_ip }}:
        api.{{ cluster_name }}.{{ base_domain }}       → {{ rendezvous_ip }}
        api-int.{{ cluster_name }}.{{ base_domain }}   → {{ rendezvous_ip }}
        *.apps.{{ cluster_name }}.{{ base_domain }}    → {{ rendezvous_ip }}
