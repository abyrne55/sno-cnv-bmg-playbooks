---
- name: Wait for cluster API to become reachable
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: wait_cluster_cv_result
  until: wait_cluster_cv_result is not failed
  retries: "{{ wait_cluster_api_retries }}"
  delay: "{{ wait_cluster_api_delay }}"
  when: not ansible_check_mode

- name: Wait for ClusterVersion Available
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: wait_cluster_cv_result
  until: >-
    wait_cluster_cv_result.resources is defined and
    wait_cluster_cv_result.resources | length > 0 and
    wait_cluster_cv_result.resources[0].status.conditions |
    selectattr('type', 'equalto', 'Available') |
    selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ wait_cluster_api_retries }}"
  delay: "{{ wait_cluster_api_delay }}"
  when: not ansible_check_mode

- name: Wait for node Ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: wait_cluster_node_result
  until: >-
    wait_cluster_node_result.resources is defined and
    wait_cluster_node_result.resources | length > 0 and
    wait_cluster_node_result.resources[0].status.conditions |
    selectattr('type', 'equalto', 'Ready') |
    selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ wait_cluster_node_retries }}"
  delay: "{{ wait_cluster_node_delay }}"
  when: not ansible_check_mode

- name: Print cluster version
  ansible.builtin.debug:
    msg: >-
      Cluster {{ cluster_name }} is up —
      version {{ wait_cluster_cv_result.resources[0].status.desired.version }}
