---
- name: Create rendered output directory
  ansible.builtin.file:
    path: "{{ build_dir }}/rendered"
    state: directory
    mode: "0755"

- name: Template VFIO Butane config
  ansible.builtin.template:
    src: 94-vfio-gpu.bu.j2
    dest: "{{ build_dir }}/rendered/94-vfio-gpu.bu"
    mode: "0644"

- name: Compile VFIO Butane config to MachineConfig YAML
  ansible.builtin.command:
    cmd: >-
      {{ butane_binary | default('butane') }} --strict
      {{ build_dir }}/rendered/94-vfio-gpu.bu
      -o {{ build_dir }}/rendered/94-vfio-gpu.yaml
  changed_when: true

- name: Read compiled MachineConfig
  ansible.builtin.slurp:
    src: "{{ build_dir }}/rendered/94-vfio-gpu.yaml"
  register: vfio_mc_content

- name: Apply VFIO MachineConfig
  kubernetes.core.k8s:
    state: present
    definition: "{{ vfio_mc_content.content | b64decode | from_yaml }}"

- name: Wait for MachineConfigPool master to finish updating
  kubernetes.core.k8s_info:
    api_version: machineconfiguration.openshift.io/v1
    kind: MachineConfigPool
    name: master
  register: mcp_result
  until: >-
    mcp_result.resources | length > 0 and
    mcp_result.resources[0].status.conditions |
    selectattr('type', 'equalto', 'Updated') |
    selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ vfio_mcp_retries }}"
  delay: "{{ vfio_mcp_delay }}"

- name: Print MCP status
  ansible.builtin.debug:
    msg: "MachineConfigPool master is Updated — VFIO GPU binding applied"
