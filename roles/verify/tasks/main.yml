---
- name: verify | Get ClusterVersion
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: cv_info

- name: verify | Print cluster version
  ansible.builtin.debug:
    msg: "Cluster version: {{ cv_info.resources[0].status.desired.version }}"

- name: verify | Get nodes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: node_info

- name: verify | Print node status
  ansible.builtin.debug:
    msg: >-
      Node {{ item.metadata.name }} —
      {{ item.status.conditions |
         selectattr('type', 'equalto', 'Ready') |
         map(attribute='status') | first }}
  loop: "{{ node_info.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

- name: verify | Get operator CSVs
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ item }}"
  register: csv_info
  loop:
    - openshift-lvm-storage
    - openshift-cnv
    - cert-manager-operator

- name: verify | Print CSV status
  ansible.builtin.debug:
    msg: >-
      {{ item.1.metadata.name }} —
      {{ item.1.status.phase | default('Unknown') }}
  loop: "{{ csv_info.results | subelements('resources') }}"
  loop_control:
    label: "{{ item.1.metadata.name }}"

- name: verify | Check certificate status
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: "{{ item.name }}"
    namespace: "{{ item.namespace }}"
  register: cert_info
  loop:
    - { name: apps-wildcard-tls, namespace: openshift-ingress }
    - { name: api-tls, namespace: openshift-config }

- name: verify | Print certificate status
  ansible.builtin.debug:
    msg: >-
      {{ item.item.name }} —
      {% if item.resources | length > 0 %}
      {{ item.resources[0].status.conditions |
         default([]) |
         selectattr('type', 'equalto', 'Ready') |
         map(attribute='status') | first | default('Unknown') }}
      {% else %}
      Not found
      {% endif %}
  loop: "{{ cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: verify | Check GPU binding (VFIO mode)
  ansible.builtin.command:
    cmd: oc debug node/{{ node_info.resources[0].metadata.name }} -- chroot /host lspci -nnk -d {{ gpu_pci_id }}
  register: gpu_lspci
  changed_when: false
  failed_when: false
  when: gpu_access_mode == 'vfio' and verify_gpu_debug

- name: verify | Print GPU binding
  ansible.builtin.debug:
    msg: "{{ gpu_lspci.stdout_lines }}"
  when: gpu_access_mode == 'vfio' and verify_gpu_debug and gpu_lspci.rc == 0

- name: verify | Check ResourceSlice (DRA mode)
  kubernetes.core.k8s_info:
    api_version: resource.k8s.io/v1beta1
    kind: ResourceSlice
  register: rs_info
  when: gpu_access_mode == 'dra'

- name: verify | Print ResourceSlice count
  ansible.builtin.debug:
    msg: "ResourceSlices: {{ rs_info.resources | length }}"
  when: gpu_access_mode == 'dra'

- name: verify | Check VM status (VFIO mode)
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ vm_name }}"
    namespace: "{{ vm_namespace }}"
  register: vmi_info
  when: gpu_access_mode == 'vfio'

- name: verify | Print VM status
  ansible.builtin.debug:
    msg: >-
      VM {{ vm_name }} —
      {{ vmi_info.resources[0].status.phase | default('Not found') }}
  when: gpu_access_mode == 'vfio' and vmi_info.resources | length > 0
