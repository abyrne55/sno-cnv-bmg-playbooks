---
- name: Get ClusterVersion
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: verify_cv_info

- name: Print cluster version
  ansible.builtin.debug:
    msg: "Cluster version: {{ verify_cv_info.resources[0].status.desired.version }}"

- name: Get nodes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: verify_node_info

- name: Print node status
  ansible.builtin.debug:
    msg: >-
      Node {{ item.metadata.name }} —
      {{ item.status.conditions |
         selectattr('type', 'equalto', 'Ready') |
         map(attribute='status') | first }}
  loop: "{{ verify_node_info.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

- name: Get operator CSVs
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ item }}"
  register: verify_csv_info
  loop: >-
    {{ ['openshift-lvm-storage', 'cert-manager-operator']
       + (['openshift-cnv'] if gpu_access_mode == 'vfio' else []) }}

- name: Print CSV status
  ansible.builtin.debug:
    msg: >-
      {{ item.1.metadata.name }} —
      {{ item.1.status.phase | default('Unknown') }}
  loop: "{{ verify_csv_info.results | subelements('resources') }}"
  loop_control:
    label: "{{ item.1.metadata.name }}"

- name: Check certificate status
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: "{{ item.name }}"
    namespace: "{{ item.namespace }}"
  register: verify_cert_info
  loop:
    - { name: apps-wildcard-tls, namespace: openshift-ingress }
    - { name: api-tls, namespace: openshift-config }

- name: Print certificate status
  ansible.builtin.debug:
    msg: >-
      {{ item.item.name }} —
      {% if item.resources | length > 0 %}
      {{ item.resources[0].status.conditions |
         default([]) |
         selectattr('type', 'equalto', 'Ready') |
         map(attribute='status') | first | default('Unknown') }}
      {% else %}
      Not found
      {% endif %}
  loop: "{{ verify_cert_info.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Check GPU binding (VFIO mode)
  ansible.builtin.command:
    cmd: oc debug node/{{ verify_node_info.resources[0].metadata.name }} -- chroot /host lspci -nnk -d {{ gpu_pci_id }}
  register: verify_gpu_lspci
  changed_when: false
  failed_when: false
  when: gpu_access_mode == 'vfio' and not (gpu_sriov_enabled | default(false)) and verify_gpu_debug

- name: Print GPU binding
  ansible.builtin.debug:
    msg: "{{ verify_gpu_lspci.stdout_lines }}"
  when: gpu_access_mode == 'vfio' and not (gpu_sriov_enabled | default(false)) and verify_gpu_debug and verify_gpu_lspci.rc == 0

- name: Check ResourceSlice (DRA mode)
  kubernetes.core.k8s_info:
    api_version: resource.k8s.io/v1beta1
    kind: ResourceSlice
  register: verify_rs_info
  when: gpu_access_mode == 'dra'

- name: Print ResourceSlice count
  ansible.builtin.debug:
    msg: "ResourceSlices: {{ verify_rs_info.resources | length }}"
  when: gpu_access_mode == 'dra'

- name: Check VM status (VFIO mode)
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ vm_name }}"
    namespace: "{{ vm_namespace }}"
  register: verify_vmi_info
  when: gpu_access_mode == 'vfio'

- name: Print VM status
  ansible.builtin.debug:
    msg: >-
      VM {{ vm_name }} —
      {{ verify_vmi_info.resources[0].status.phase | default('Not found') }}
  when: gpu_access_mode == 'vfio' and verify_vmi_info.resources | length > 0
