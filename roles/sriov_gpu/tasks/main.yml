---
- name: Apply SR-IOV GPU MachineConfig
  kubernetes.core.k8s:
    state: present
    src: "{{ role_path }}/files/94-sriov-gpu.yaml"

- name: Wait for MachineConfigPool master to finish updating
  kubernetes.core.k8s_info:
    api_version: machineconfiguration.openshift.io/v1
    kind: MachineConfigPool
    name: master
  register: sriov_gpu_mcp_result
  until: >-
    sriov_gpu_mcp_result.resources is defined and
    sriov_gpu_mcp_result.resources | length > 0 and
    sriov_gpu_mcp_result.resources[0].status.conditions |
    selectattr('type', 'equalto', 'Updated') |
    selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ sriov_gpu_mcp_retries }}"
  delay: "{{ sriov_gpu_mcp_delay }}"

- name: Print MCP status
  ansible.builtin.debug:
    msg: "MachineConfigPool master is Updated — SR-IOV GPU kernel args applied"
