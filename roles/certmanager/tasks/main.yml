---
- name: Create namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ certmanager_namespace }}"

- name: Create OperatorGroup
  kubernetes.core.k8s:
    state: present
    template: operatorgroup.yaml.j2

- name: Create Subscription
  kubernetes.core.k8s:
    state: present
    template: subscription.yaml.j2

- name: Wait for CSV to succeed
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ certmanager_namespace }}"
    label_selectors:
      - "operators.coreos.com/openshift-cert-manager-operator.{{ certmanager_namespace }}"
  register: certmanager_csv
  until: >-
    certmanager_csv.resources | length > 0 and
    certmanager_csv.resources[0].status.phase | default('') == 'Succeeded'
  retries: "{{ certmanager_csv_retries }}"
  delay: "{{ certmanager_csv_delay }}"

- name: Wait for cert-manager pods ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: cert-manager
    label_selectors:
      - app=cert-manager
    field_selectors:
      - status.phase=Running
  register: certmanager_pods
  until: certmanager_pods.resources | length > 0
  retries: 30
  delay: 10

- name: Wait for ClusterIssuer CRD
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: clusterissuers.cert-manager.io
  register: certmanager_ci_crd
  until: certmanager_ci_crd.resources | length > 0
  retries: 15
  delay: 10

- name: Create Cloudflare API token Secret
  kubernetes.core.k8s:
    state: present
    template: cloudflare-secret.yaml.j2

- name: Apply ClusterIssuer
  kubernetes.core.k8s:
    state: present
    template: clusterissuer.yaml.j2

- name: Apply Certificates
  kubernetes.core.k8s:
    state: present
    template: certificates.yaml.j2

- name: Wait for apps wildcard certificate Ready
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: apps-wildcard-tls
    namespace: openshift-ingress
  register: certmanager_apps_cert
  until: >-
    certmanager_apps_cert.resources | length > 0 and
    certmanager_apps_cert.resources[0].status.conditions |
    default([]) |
    selectattr('type', 'equalto', 'Ready') |
    selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ certmanager_cert_retries }}"
  delay: "{{ certmanager_cert_delay }}"

- name: Wait for API certificate Ready
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: api-tls
    namespace: openshift-config
  register: certmanager_api_cert
  until: >-
    certmanager_api_cert.resources | length > 0 and
    certmanager_api_cert.resources[0].status.conditions |
    default([]) |
    selectattr('type', 'equalto', 'Ready') |
    selectattr('status', 'equalto', 'True') | list | length > 0
  retries: "{{ certmanager_cert_retries }}"
  delay: "{{ certmanager_cert_delay }}"

- name: Patch IngressController with wildcard cert
  kubernetes.core.k8s:
    state: patched
    api_version: operator.openshift.io/v1
    kind: IngressController
    name: default
    namespace: openshift-ingress-operator
    definition:
      spec:
        defaultCertificate:
          name: apps-wildcard-tls

- name: Patch APIServer with API cert
  kubernetes.core.k8s:
    state: patched
    api_version: config.openshift.io/v1
    kind: APIServer
    name: cluster
    definition:
      spec:
        servingCerts:
          namedCertificates:
            - names:
                - "api.{{ cluster_name }}.{{ base_domain }}"
              servingCertificate:
                name: api-tls

- name: Strip self-signed CA from kubeconfig
  ansible.builtin.replace:
    path: "{{ build_dir }}/auth/kubeconfig"
    regexp: '^\s*certificate-authority-data:.*$'
    replace: ""

- name: Wait for kube-apiserver ClusterOperator to settle
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterOperator
    name: kube-apiserver
  register: certmanager_co_result
  until: >-
    certmanager_co_result.resources | length > 0 and
    certmanager_co_result.resources[0].status.conditions |
    selectattr('type', 'equalto', 'Available') |
    selectattr('status', 'equalto', 'True') | list | length > 0 and
    certmanager_co_result.resources[0].status.conditions |
    selectattr('type', 'equalto', 'Progressing') |
    selectattr('status', 'equalto', 'False') | list | length > 0
  retries: "{{ certmanager_co_retries }}"
  delay: "{{ certmanager_co_delay }}"

- name: Print status
  ansible.builtin.debug:
    msg: "TLS certificates issued and wired — kube-apiserver settled"
