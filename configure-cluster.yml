---
- name: Configure SNO cluster with CNV + BMG GPU
  hosts: localhost
  gather_facts: false

  vars_files:
    - vars/cluster.yml
    - vars/vault.yml

  environment:
    K8S_AUTH_KUBECONFIG: "{{ build_dir }}/auth/kubeconfig"

  pre_tasks:
    - name: Check oc CLI is available
      ansible.builtin.command:
        cmd: which oc
      changed_when: false
      failed_when: false
      register: preflight_oc

    - name: Fail if oc missing
      ansible.builtin.fail:
        msg: "Required tool 'oc' not found in PATH."
      when: preflight_oc.rc != 0

    - name: Check required Python packages
      community.general.python_requirements_info:
        dependencies:
          - kubernetes
      register: preflight_python

    - name: Fail if Python packages missing
      ansible.builtin.fail:
        msg: >-
          Missing Python packages: {{ preflight_python.not_found | join(', ') }}.
          Install with: pip install {{ preflight_python.not_found | join(' ') }}
      when: preflight_python.not_found | length > 0

  roles:
    - role: wait_cluster
      tags: [wait]

    - role: vfio_gpu
      tags: [vfio]
      when: gpu_access_mode == 'vfio' and not (gpu_sriov_enabled | default(false))

    - role: sriov_gpu
      tags: [sriov]
      when: gpu_sriov_enabled | default(false)

    - role: lvms
      tags: [lvms]

    - role: cnv
      tags: [cnv]
      when: gpu_access_mode == 'vfio'

    - role: certmanager
      tags: [certmanager]

    - role: dra_gpu
      tags: [dra]
      when: gpu_access_mode == 'dra'

    - role: bmg_vm
      tags: [vm]
      when: gpu_access_mode == 'vfio'

    - role: verify
      tags: [verify]
