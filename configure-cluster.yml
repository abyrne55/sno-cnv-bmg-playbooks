---
- name: Configure SNO cluster with CNV + BMG GPU
  hosts: localhost
  gather_facts: false

  vars_files:
    - vars/cluster.yml
    - vars/vault.yml

  environment:
    K8S_AUTH_KUBECONFIG: "{{ build_dir }}/auth/kubeconfig"

  pre_tasks:
    - name: Check oc CLI is available
      ansible.builtin.command:
        cmd: which oc
      changed_when: false
      failed_when: false
      register: preflight_oc

    - name: Fail if oc missing
      ansible.builtin.fail:
        msg: "Required tool 'oc' not found in PATH."
      when: preflight_oc.rc != 0

    - name: Check kubernetes Python module is installed
      ansible.builtin.command:
        cmd: "{{ ansible_python_interpreter | default('python3') }} -c 'import kubernetes'"
      changed_when: false
      failed_when: false
      register: preflight_k8s_python

    - name: Fail if kubernetes module missing
      ansible.builtin.fail:
        msg: >-
          The 'kubernetes' Python module is required but not installed.
          Install it with: pip install kubernetes
      when: preflight_k8s_python.rc != 0

  roles:
    - role: wait_cluster
      tags: [wait]

    - role: vfio_gpu
      tags: [vfio]
      when: gpu_access_mode == 'vfio'

    - role: lvms
      tags: [lvms]

    - role: cnv
      tags: [cnv]
      when: gpu_access_mode == 'vfio'

    - role: certmanager
      tags: [certmanager]

    - role: dra_gpu
      tags: [dra]
      when: gpu_access_mode == 'dra'

    - role: bmg_vm
      tags: [vm]
      when: gpu_access_mode == 'vfio'

    - role: verify
      tags: [verify]
