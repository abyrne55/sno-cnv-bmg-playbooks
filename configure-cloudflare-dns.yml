---
- name: Configure Cloudflare DNS records for SNO cluster
  hosts: localhost
  gather_facts: false

  vars_files:
    - vars/cluster.yml
    - vars/vault.yml

  vars:
    dns_state: present
    dns_records:
      - "{{ cluster_name }}.{{ base_domain }}"
      - "api.{{ cluster_name }}.{{ base_domain }}"
      - "api-int.{{ cluster_name }}.{{ base_domain }}"
      - "*.apps.{{ cluster_name }}.{{ base_domain }}"

  pre_tasks:
    - name: Check required Python packages
      community.general.python_requirements_info:
        dependencies:
          - dnspython
          - paramiko
      register: preflight_python

    - name: Fail if Python packages missing
      ansible.builtin.fail:
        msg: >-
          Missing Python packages: {{ preflight_python.not_found | join(', ') }}.
          Install with: pip install {{ preflight_python.not_found | join(' ') }}
      when: preflight_python.not_found | length > 0

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - cluster_name is defined
          - base_domain is defined
          - rendezvous_ip is defined
          - vault_cloudflare_api_token is defined
        fail_msg: >-
          Missing required variables. Ensure cluster_name, base_domain,
          rendezvous_ip, and vault_cloudflare_api_token are defined.

    - name: Validate Cloudflare API token is not placeholder
      ansible.builtin.fail:
        msg: >-
          vault_cloudflare_api_token is still the placeholder value.
          Run 'ansible-vault edit vars/vault.yml' to set it.
      when: vault_cloudflare_api_token == "REPLACE_WITH_CLOUDFLARE_API_TOKEN"

    - name: Validate rendezvous_ip is a valid IPv4 address
      ansible.builtin.fail:
        msg: "rendezvous_ip '{{ rendezvous_ip }}' is not a valid IPv4 address."
      when: rendezvous_ip is not regex('^(\d{1,3}\.){3}\d{1,3}$')

  tasks:
    - name: Show planned DNS changes
      ansible.builtin.debug:
        msg: >-
          {{ (dns_state == "present") | ternary("Creating", "Removing") }}
          DNS records for {{ cluster_name }}.{{ base_domain }}
          → {{ rendezvous_ip }}:
          {{ dns_records | join(", ") }}

    - name: Manage Cloudflare DNS records
      community.general.cloudflare_dns:
        zone: "{{ base_domain }}"
        record: "{{ item }}"
        type: A
        content: "{{ rendezvous_ip }}"
        ttl: 1
        solo: false
        state: "{{ dns_state }}"
        api_token: "{{ vault_cloudflare_api_token }}"
      loop: "{{ dns_records }}"
      loop_control:
        label: "{{ item }}"

    - name: Verify DNS resolution
      ansible.builtin.set_fact:
        dns_verification: >-
          {{ dns_verification | default([]) +
             [{"record": item,
               "result": lookup("community.general.dig", item, "@1.1.1.1",
                                errors="ignore")}] }}
      loop: "{{ dns_records }}"
      loop_control:
        label: "{{ item }}"
      when: dns_state == "present"

    - name: Show DNS verification results
      ansible.builtin.debug:
        msg: >-
          {{ item.record }}
          → {{ item.result | default("(no response yet — propagation may take a moment)", true) }}
      loop: "{{ dns_verification }}"
      loop_control:
        label: "{{ item.record }}"
      when: dns_state == "present"

    # ── SSHFP records ──────────────────────────────────────────────

    - name: Create SSH key directory
      ansible.builtin.file:
        path: "{{ build_dir }}/ssh"
        state: directory
        mode: "0700"
      when: sshfp_enabled and dns_state == "present"

    - name: Generate SSH host keys
      ansible.builtin.command:
        cmd: ssh-keygen -t {{ item }} -f {{ build_dir }}/ssh/ssh_host_{{ item }}_key -N ""
        creates: "{{ build_dir }}/ssh/ssh_host_{{ item }}_key"
      loop:
        - ed25519
        - ecdsa
      when: sshfp_enabled and dns_state == "present"

    - name: Check if SSH keys exist (for deletion)
      ansible.builtin.stat:
        path: "{{ build_dir }}/ssh/ssh_host_{{ item }}_key.pub"
      loop:
        - ed25519
        - ecdsa
      register: sshfp_key_check
      when: sshfp_enabled and dns_state == "absent"

    - name: Set SSH keys existence flag
      ansible.builtin.set_fact:
        sshfp_keys_exist: >-
          {{ sshfp_key_check.results | default([])
             | selectattr('stat', 'defined')
             | selectattr('stat.exists')
             | list | length > 0 }}
      when: sshfp_enabled and dns_state == "absent"

    - name: Skip SSHFP deletion (no keys on disk)
      ansible.builtin.debug:
        msg: >-
          No SSH host keys found in {{ build_dir }}/ssh/ —
          skipping SSHFP record deletion. If records exist in CloudFlare,
          remove them manually or regenerate keys first.
      when: sshfp_enabled and dns_state == "absent" and not sshfp_keys_exist

    - name: Compute SSHFP fingerprints (SHA-256 only)
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          ssh-keygen -r {{ cluster_name }}.{{ base_domain }}
          -f {{ build_dir }}/ssh/ssh_host_{{ item }}_key.pub
          | awk '$5 == 2 {print $4, $5, $6}'
        executable: /bin/bash
      loop:
        - ed25519
        - ecdsa
      register: sshfp_raw
      changed_when: false
      when: >-
        sshfp_enabled and
        (dns_state == "present" or
         (dns_state == "absent" and sshfp_keys_exist | default(false)))

    - name: Build SSHFP record list
      ansible.builtin.set_fact:
        sshfp_lines: >-
          {{ sshfp_raw.results
             | selectattr('stdout_lines', 'defined')
             | map(attribute='stdout_lines')
             | flatten | list }}
      when: >-
        sshfp_enabled and
        (dns_state == "present" or
         (dns_state == "absent" and sshfp_keys_exist | default(false)))

    - name: Manage SSHFP DNS records
      community.general.cloudflare_dns:
        zone: "{{ base_domain }}"
        record: "{{ cluster_name }}.{{ base_domain }}"
        type: SSHFP
        algorithm: "{{ item.split()[0] | int }}"
        hash_type: "{{ item.split()[1] | int }}"
        value: "{{ item.split()[2] }}"
        ttl: 1
        solo: false
        state: "{{ dns_state }}"
        api_token: "{{ vault_cloudflare_api_token }}"
      loop: "{{ sshfp_lines }}"
      loop_control:
        label: "algo={{ item.split()[0] }} hash={{ item.split()[1] }}"
      when: >-
        sshfp_enabled and
        (dns_state == "present" or
         (dns_state == "absent" and sshfp_keys_exist | default(false)))

    - name: Verify SSHFP DNS resolution
      ansible.builtin.set_fact:
        sshfp_verification: >-
          {{ lookup("community.general.dig",
                    cluster_name + "." + base_domain + ".",
                    "qtype=SSHFP", "@1.1.1.1", errors="ignore") }}
      when: sshfp_enabled and dns_state == "present"

    - name: Show SSHFP verification results
      ansible.builtin.debug:
        msg: >-
          SSHFP {{ cluster_name }}.{{ base_domain }}
          → {{ sshfp_verification | default("(no response yet — propagation may take a moment)", true) }}
      when: sshfp_enabled and dns_state == "present"

    - name: Configure local SSH client for cluster node
      community.general.ssh_config:
        user: "{{ lookup('env', 'USER') }}"
        host: "{{ cluster_name }}"
        hostname: "{{ cluster_name }}.{{ base_domain }}"
        remote_user: core
        identities_only: true
        strict_host_key_checking: "yes"
        state: "{{ dns_state }}"
        other_options:
          hostkeyalias: "{{ cluster_name }}.{{ base_domain }}"
          pubkeyauthentication: "yes"
          preferredauthentications: publickey
          verifyhostkeydns: "yes"
          checkhostip: "yes"
      when: sshfp_enabled

    - name: Show summary
      ansible.builtin.debug:
        msg: >-
          DNS records {{ (dns_state == "present") | ternary("created", "removed") }}
          for {{ cluster_name }}.{{ base_domain }}
          {{ (sshfp_enabled) | ternary("(including SSHFP)", "") }}.
