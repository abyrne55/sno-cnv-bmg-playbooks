---
apiVersion: v1
kind: Pod
metadata:
  name: dra-pod-test-2
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: gpu
      image: docker.io/intel/oneapi:2026.0.0-devel-rockylinux10
      command:
        - sh
        - -c
        - |
          echo "=== /dev/dri/ ==="
          ls -la /dev/dri/
          echo "=== sycl-ls ==="
          sycl-ls
          echo "=== PASS: DRI devices and SYCL GPU detected ==="
          sleep 30
      resources:
        claims:
          - name: gpu
  resourceClaims:
    - name: gpu
      resourceClaimTemplateName: gpu-vf-claim
