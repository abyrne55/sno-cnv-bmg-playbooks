---
- name: Generate agent-based installer ISO
  hosts: localhost
  gather_facts: false

  vars_files:
    - vars/cluster.yml
    - vars/vault.yml

  vars:
    openshift_install_binary: openshift-install
    butane_binary: butane
    butane_configs:
      - 90-var-virtstore-partition.bu
      - 91-iommu-pt.bu
      - 92-serial-console.bu
      - 93-sysrq.bu
    butane_configs_sshfp:
      - 95-ssh-host-keys.bu

  pre_tasks:
    - name: Check required CLI tools
      ansible.builtin.command:
        cmd: "which {{ item }}"
      changed_when: false
      failed_when: false
      register: preflight_cli
      loop:
        - "{{ openshift_install_binary }}"
        - "{{ butane_binary }}"

    - name: Fail if CLI tools missing
      ansible.builtin.fail:
        msg: >-
          Required tool '{{ item.item }}' not found in PATH.
      when: item.rc != 0
      loop: "{{ preflight_cli.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check SSH host keys exist for SSHFP
      ansible.builtin.stat:
        path: "{{ build_dir }}/ssh/ssh_host_{{ item }}_key"
      loop:
        - ed25519
        - ecdsa
      register: sshfp_key_preflight
      when: sshfp_enabled

    - name: Fail if SSH host keys missing
      ansible.builtin.fail:
        msg: >-
          SSH host key '{{ item.stat.path }}' not found.
          Run configure-cloudflare-dns.yml first to generate keys and SSHFP records.
      when: sshfp_enabled and not item.stat.exists
      loop: "{{ sshfp_key_preflight.results }}"
      loop_control:
        label: "{{ item.item }}"

  tasks:
    - name: Check if ISO already exists
      ansible.builtin.stat:
        path: "{{ build_dir }}/agent.x86_64.iso"
      register: existing_iso

    - name: Warn that ISO generation is being skipped
      ansible.builtin.debug:
        msg: >-
          ISO already exists at {{ (build_dir + '/agent.x86_64.iso') | realpath }}.
          Delete it and re-run to regenerate.
      when: existing_iso.stat.exists

    - name: Create build directory
      ansible.builtin.file:
        path: "{{ build_dir }}"
        state: directory
        mode: "0755"
      when: not existing_iso.stat.exists

    - name: Create openshift subdirectory
      ansible.builtin.file:
        path: "{{ build_dir }}/openshift"
        state: directory
        mode: "0755"
      when: not existing_iso.stat.exists

    - name: Template install-config.yaml
      ansible.builtin.template:
        src: install-config.yaml.j2
        dest: "{{ build_dir }}/install-config.yaml"
        mode: "0600"
      when: not existing_iso.stat.exists

    - name: Template agent-config.yaml
      ansible.builtin.template:
        src: agent-config.yaml.j2
        dest: "{{ build_dir }}/agent-config.yaml"
        mode: "0644"
      when: not existing_iso.stat.exists

    - name: Template Butane configs
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ build_dir }}/{{ item }}"
        mode: "0644"
      loop: "{{ butane_configs + (butane_configs_sshfp if sshfp_enabled else []) }}"
      when: not existing_iso.stat.exists

    - name: Compile Butane configs to MachineConfig YAML
      ansible.builtin.command:
        cmd: >-
          {{ butane_binary }} --strict
          {{ build_dir }}/{{ item }}
          -o {{ build_dir }}/openshift/{{ item | regex_replace('\.bu$', '.yaml') }}
      loop: "{{ butane_configs + (butane_configs_sshfp if sshfp_enabled else []) }}"
      changed_when: true
      when: not existing_iso.stat.exists

    - name: Back up install-config.yaml
      ansible.builtin.copy:
        src: "{{ build_dir }}/install-config.yaml"
        dest: "{{ build_dir }}/install-config.yaml.bak"
        mode: "0600"
      when: not existing_iso.stat.exists

    - name: Back up agent-config.yaml
      ansible.builtin.copy:
        src: "{{ build_dir }}/agent-config.yaml"
        dest: "{{ build_dir }}/agent-config.yaml.bak"
        mode: "0644"
      when: not existing_iso.stat.exists

    - name: Generate agent ISO
      ansible.builtin.command:
        cmd: "{{ openshift_install_binary }} agent create image --dir {{ build_dir }}"
      changed_when: true
      when: not existing_iso.stat.exists

    - name: Restore install-config.yaml from backup
      ansible.builtin.copy:
        src: "{{ build_dir }}/install-config.yaml.bak"
        dest: "{{ build_dir }}/install-config.yaml"
        mode: "0600"
      when: not existing_iso.stat.exists

    - name: Restore agent-config.yaml from backup
      ansible.builtin.copy:
        src: "{{ build_dir }}/agent-config.yaml.bak"
        dest: "{{ build_dir }}/agent-config.yaml"
        mode: "0644"
      when: not existing_iso.stat.exists

    - name: Check required Python packages
      community.general.python_requirements_info:
        dependencies:
          - dnspython
      register: preflight_python

    - name: Fail if Python packages missing
      ansible.builtin.fail:
        msg: >-
          Missing Python packages: {{ preflight_python.not_found | join(', ') }}.
          Install with: pip install {{ preflight_python.not_found | join(' ') }}
      when: preflight_python.not_found | length > 0

    - name: Verify DNS records resolve
      ansible.builtin.assert:
        that:
          - lookup("community.general.dig", item) == rendezvous_ip
        fail_msg: >-
          {{ item }} does not resolve to {{ rendezvous_ip }}.
          Run configure-cloudflare-dns.yml first or verify DNS propagation.
      loop:
        - "api.{{ cluster_name }}.{{ base_domain }}"
        - "api-int.{{ cluster_name }}.{{ base_domain }}"
        - "console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}"

    - name: Print ISO location
      ansible.builtin.debug:
        msg: "ISO generated at: {{ (build_dir + '/agent.x86_64.iso') | realpath }}"

    - name: Print kubeconfig location
      ansible.builtin.debug:
        msg: "Kubeconfig: {{ (build_dir + '/auth/kubeconfig') | realpath }}"

    - name: Read kubeadmin password
      ansible.builtin.slurp:
        src: "{{ build_dir }}/auth/kubeadmin-password"
      register: kubeadmin_password_file

    - name: Print web console login details
      ansible.builtin.debug:
        msg: |
          Web console: https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}
          Username:    kubeadmin
          Password:    {{ kubeadmin_password_file.content | b64decode }}
